<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika Interaktif</title>
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: grey;
			user-select: none;
			-webkit-user-select: none;
            overflow: hidden;
		}
		.tutup {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: black;
			user-select: none;
			-webkit-user-select: none;
		}
		.areabtn {
			width: 170px;
			height: 45px;
			transform: translate(-50%, -50%);
			position: absolute;
			cursor: pointer;
			touch-action: none;
			background-color: black;
			opacity : 0;
			user-select: none;
			-webkit-user-select: none;
		}
		.fadeout {
			pointer-events: none;
			/*animation: fadeInOut 1s ease-in-out infinite;*/
			animation: fadeOut 1s ease-out forwards;
		}
		@keyframes fadeOut {
			0% { opacity: 1; }
			1% { opacity: 1; }
			99% { opacity: 0; }
			100% { opacity: 0; }
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		<div id="isibtn1">
			<div class="areabtn" id="tombolA0"></div>
			<div class="areabtn" id="tombolA1"></div>
		</div>
		<div id="isibtn2">
			<div class="areabtn" id="tombolB0"></div>
			<div class="areabtn" id="tombolB1"></div>
			<div class="areabtn" id="tombolB2"></div>
			<div class="areabtn" id="tombolB3"></div>
			<div class="areabtn" id="tombolB4"></div>
			<div class="areabtn" id="tombolB5"></div>
			<div class="areabtn" id="tombolB6"></div>
			<div class="areabtn" id="tombolB7"></div>
			<div class="areabtn" id="tombolB8"></div>
			<div class="areabtn" id="tombolB9"></div>
		</div>
		<div class="tutup fadeout" id="tutup"></div>
	</div>
	<script>
		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);
			return r;
		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}
	</script>
	<script>
		const myBG = document.getElementById("bg");

		const tombol1 = document.getElementById("tombol1");
		const tutup = document.getElementById("tutup");
		myBG.style.backgroundImage = "url(../img/bg.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		myBG.w = 840;
		myBG.h = 472;
		var xybtnA = [[140,175],[140,230]];
		var xybtnB = [[370,175],[370,230],[370,285],[370,340],[370,395],[550,175],[550,230],[550,285],[550,340],[550,395]];
		var arTombolA = [];
		var arTombolB = [];
		for(var i=0;i<2;i++){
			arTombolA[i] = document.getElementById('tombolA'+i);
			arTombolA[i].style.left = ''+xybtnA[i][0]+'px';
			arTombolA[i].style.top = ''+xybtnA[i][1]+'px';
			arTombolA[i].no = i;
		}
		for(var i=0;i<10;i++){
			arTombolB[i] = document.getElementById('tombolB'+i);
			arTombolB[i].style.left = ''+xybtnB[i][0]+'px';
			arTombolB[i].style.top = ''+xybtnB[i][1]+'px';
			arTombolB[i].no = i;
		}
		
		
	</script>
	<script>

						"../BilanganRatusanRibu/html/AngkaRatusRibuan.html",

	<script>
		var fixzoom = 100;
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});
		function XYbenda(){
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			for(var i=0;i<2;i++){
				arTombol[i].style.left = ''+xybtn[i][0]+'px';
				arTombol[i].style.top = ''+xybtn[i][1]+'px';
			}
		}
		function ZoomAll(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			XYbenda();
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);

	</script>
</body>
</html>
